<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Cinematic Surprise</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for Premium Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;800&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Loader -->
    <div id="loader">
        <div class="spinner"></div>
        <p>Preparing Magic...</p>
    </div>

    <!-- Background Elements -->
    <div class="stars"></div>
    <div class="particles"></div>

    <!-- Music Toggle -->
    <div class="music-control" onclick="toggleMusic()">
        <span id="music-icon">🎵</span>
    </div>

    <main class="container">
        <!-- Hero Section -->
        <div id="hero">
            <h1 class="neon-text">Happy Birthday 🎂</h1>
            
            <div class="gift-section">
                <div class="pulse-ring"></div>
                <div class="gift-box" id="giftBox" onclick="openGift()">
                    <div class="gift-lid"></div>
                    <div class="gift-body"></div>
                </div>
            </div>
            <p class="instruction">Tap to reveal the magic</p>
        </div>

        <!-- Surprise Reveal Section -->
        <div id="reveal" class="hidden">
            <div class="glass-card">
                <div class="cake">
                    <div class="candle"></div>
                </div>
                <h2 class="message-title">To Someone Special</h2>
                <p class="message-body">May your day be as extraordinary as this moment. Here's to a year of light, love, and endless discovery.</p>
                <div class="sparkles-container"></div>
            </div>
        </div>
    </main>

    <canvas id="confetti"></canvas>
    <script src="script.js"></script>
</body>
</html>
